<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — World Owners</title>
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --accent: #C7A24B;
    --accent2: #e2c97e;
    --text: #f0ede8;
    --muted: #888;
    --tag-bg: #252525;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Times New Roman MT', 'Times New Roman', Times, serif;
    font-weight: 400;
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14,14,14,0.93);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Times New Roman MT', 'Times New Roman', Times, serif;
    font-size: 1.35rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .header-note {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .hero {
    padding: 5rem 2rem 3.5rem;
    text-align: center;
    background: radial-gradient(ellipse at 50% 0%, rgba(199,162,75,0.07) 0%, transparent 70%);
  }

  .hero-eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.4rem;
  }

  .hero h1 {
    font-size: clamp(2rem, 5.5vw, 3.6rem);
    font-weight: 400;
    font-style: italic;
    line-height: 1.15;
    margin-bottom: 1.2rem;
  }

  .hero h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .hero p {
    color: var(--muted);
    font-size: 0.88rem;
    max-width: 420px;
    margin: 0 auto 2.5rem;
    line-height: 1.8;
    letter-spacing: 0.02em;
  }

  .controls {
    padding: 0 2rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    max-width: 1300px;
    margin: 0 auto;
  }

  .search-wrap { position: relative; }

  .search-wrap svg {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    stroke: var(--muted);
    width: 16px;
    height: 16px;
  }

  #search {
    width: 100%;
    padding: 0.8rem 1rem 0.8rem 2.6rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Times New Roman MT', 'Times New Roman', Times, serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.03em;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .filter-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  .filter-btn {
    padding: 0.42rem 1.1rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Times New Roman MT', 'Times New Roman', Times, serif;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.18s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0e0e;
    font-weight: 700;
  }

  .results-info {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 2rem 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.07em;
  }

  .catalog {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
  }

  .brand-section { margin-bottom: 4.5rem; animation: fadeUp 0.35s ease both; }

  .brand-header {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .brand-logo-placeholder {
    width: 50px;
    height: 50px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    color: var(--accent);
    text-align: center;
    padding: 4px;
  }

  .brand-info h2 {
    font-size: 1.6rem;
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.04em;
  }

  .brand-info p {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.25rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .category-group { margin-bottom: 2.5rem; }

  .category-label {
    font-size: 0.65rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .category-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.2rem;
  }

  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
    position: relative;
  }

  .product-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 12px 32px rgba(199,162,75,0.13);
  }

  /* ── Product image: show full sneaker ── */
  .img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #181818;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .product-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    background: #181818;
    display: block;
    transition: opacity 0.2s;
  }

  /* ── Arrow nav buttons ── */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    background: rgba(14,14,14,0.75);
    border: 1px solid rgba(199,162,75,0.4);
    border-radius: 50%;
    color: var(--accent);
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.2s, background 0.2s;
    padding: 0;
    backdrop-filter: blur(4px);
  }
  .img-wrap:hover .nav-arrow,
  .product-card:hover .nav-arrow { opacity: 1; }
  .nav-arrow:hover { background: rgba(199,162,75,0.25); }
  .nav-arrow.prev { left: 6px; }
  .nav-arrow.next { right: 6px; }
  /* Mobile: always visible, no hover needed */
  @media (max-width: 600px) {
    .nav-arrow { display: none; }
    .img-wrap { touch-action: pan-y; }
  }

  .product-img-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    color: #444;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .product-img-placeholder svg { width: 26px; height: 26px; stroke: #383838; }

  .product-info { padding: 0.85rem 1rem; }

  .product-name { font-size: 0.82rem; margin-bottom: 0.25rem; line-height: 1.35; }

  .product-ref { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.06em; }

  .product-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.55rem; }

  .product-tag {
    background: var(--tag-bg);
    border-radius: 3px;
    padding: 0.12rem 0.4rem;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .product-price { font-size: 0.88rem; color: var(--accent); font-weight: 700; margin-top: 0.5rem; }

  /* ── Color swatch dots ── */
  .color-dots {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 12px 4px;
    background: rgba(0,0,0,0.25);
  }
  .color-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: none;
    outline: 2px solid transparent;
    outline-offset: 2px;
    cursor: pointer;
    transition: transform 0.15s, outline-color 0.15s;
    flex-shrink: 0;
    padding: 0;
    background-size: cover !important;
  }
  .color-dot:hover { transform: scale(1.2); }
  .color-dot.active {
    outline-color: var(--accent);
    transform: scale(1.15);
    box-shadow: 0 0 0 1px rgba(199,162,75,0.5);
  }

  /* ── Variant label under name ── */
  .variant-color-name {
    font-size: 0.75rem;
    color: var(--accent);
    margin-top: 1px;
    margin-bottom: 2px;
    letter-spacing: 0.03em;
    font-style: italic;
  }

  /* ── "N cores" badge ── */
  .variant-count {
    display: inline-block;
    font-size: 0.65rem;
    background: var(--accent);
    color: #0e0e0e;
    border-radius: 20px;
    padding: 1px 7px;
    margin-left: 6px;
    vertical-align: middle;
    font-style: normal;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .order-badge {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    background: rgba(14,14,14,0.88);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.18rem 0.55rem;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .product-card:hover .order-badge { opacity: 1; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    max-width: 540px;
    width: 100%;
    overflow: hidden;
    transform: scale(0.95) translateY(16px);
    transition: transform 0.25s;
  }

  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal-gallery {
    position: relative;
    width: 100%;
    background: #181818;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 260px;
  }
  .modal-img { width: 100%; max-height: 340px; object-fit: contain; display: block; background: #181818; }
  .modal-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    background: rgba(14,14,14,0.8);
    border: 1px solid rgba(199,162,75,0.5);
    border-radius: 50%;
    color: var(--accent);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
  }
  .modal-nav:hover { background: rgba(199,162,75,0.2); }
  .modal-nav.prev { left: 8px; }
  .modal-nav.next { right: 8px; }
  .modal-dots {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 10;
  }
  .modal-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .modal-dot.active { background: var(--accent); transform: scale(1.3); }

  .modal-img-placeholder {
    width: 100%;
    height: 260px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-img-placeholder svg { width: 44px; height: 44px; stroke: #333; }

  .modal-body { padding: 1.8rem; }

  .modal-brand-tag { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }

  .modal-name { font-size: 1.5rem; font-weight: 400; font-style: italic; margin-bottom: 0.3rem; }

  .modal-ref { font-size: 0.72rem; color: var(--muted); margin-bottom: 1rem; letter-spacing: 0.06em; }

  .modal-price { font-size: 1.25rem; color: var(--accent); font-weight: 700; margin-bottom: 1.2rem; }

  .modal-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.5rem; }

  .modal-tag { background: var(--tag-bg); border-radius: 5px; padding: 0.28rem 0.65rem; font-size: 0.7rem; color: var(--muted); }

  .modal-actions { display: flex; gap: 0.8rem; }

  .btn-order {
    flex: 1;
    padding: 0.85rem;
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    border-radius: 7px;
    font-family: 'Times New Roman MT', 'Times New Roman', Times, serif;
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.18s;
  }

  .btn-order:hover { background: var(--accent2); }

  .btn-close {
    padding: 0.85rem 1.2rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--muted);
    font-family: 'Times New Roman MT', 'Times New Roman', Times, serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: border-color 0.18s, color 0.18s;
  }

  .btn-close:hover { border-color: var(--text); color: var(--text); }

  .empty-state { text-align: center; padding: 5rem 2rem; color: var(--muted); }
  .empty-state svg { width: 44px; height: 44px; stroke: #333; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.9rem; }

  footer {
    border-top: 1px solid var(--border);
    padding: 2rem;
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    .product-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
    .hero { padding: 3rem 1.5rem 2rem; }
    .controls, .catalog, .results-info { padding-left: 1.2rem; padding-right: 1.2rem; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">World Owners</div>
  <div class="header-note">Catálogo Exclusivo · Clientes</div>
</header>

<section class="hero">
  <div class="hero-eyebrow">Coleção atual</div>
  <h1>O luxo que sempre quiseste,<br>ao <em>preço que mereces.</em></h1>
  <p>Peças selecionadas das melhores marcas. Para encomendar, contacte-nos via Instagram.</p>
</section>

<div class="controls">

  <div class="filter-row" id="filter-row">

<div class="results-info" id="results-info"></div>
<div class="catalog" id="catalog"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div id="modal-img-wrap"></div>
    <div class="modal-body">
      <div class="modal-brand-tag" id="modal-brand"></div>
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-ref" id="modal-ref"></div>
      <div class="modal-price" id="modal-price"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <div class="modal-actions">
        <button class="btn-order" id="btn-order">📩 Encomendar via Instagram</button>
        <button class="btn-close" onclick="closeModal()">Fechar</button>
      </div>
    </div>
  </div>
</div>

<footer>World Owners · Catálogo Privado · Partilhe apenas com clientes</footer>

// ============================================================
// MAPEAMENTO DE CORES PARA SWATCHES
// ============================================================
function getSwatchColor(colorStr) {
  if (!colorStr) return '#888';
  const c = colorStr.toLowerCase();
  // Multi-color → split gradient
  if (c.includes('/')) {
    const parts = c.split('/').map(s => s.trim());
    const c1 = singleColor(parts[0]);
    const c2 = singleColor(parts[1]);
    return `linear-gradient(135deg, ${c1} 50%, ${c2} 50%)`;
  }
  return singleColor(c);
}
function singleColor(c) {
  c = c.trim().toLowerCase();
  if (c.includes('metál') || c.includes('metalic') || c.includes('prateado') || c.includes('silver')) return 'linear-gradient(135deg,#c0c0c0,#e8e8e8,#a0a0a0)';
  if (c.includes('dourado') || c.includes('gold') || c.includes('wonder')) return '#C7A24B';
  if (c.includes('preto') || c.includes('black') || c.includes('core black')) return '#1a1a1a';
  if (c.includes('off white') || c.includes('creme') || c.includes('cream')) return '#f5f0e0';
  if (c.includes('branco') || c.includes('white')) return '#f0ede8';
  if (c.includes('cinza prateado')) return '#b0b8c0';
  if (c.includes('cinza') || c.includes('grey') || c.includes('gray')) return '#888';
  if (c.includes('vermelho') || c.includes('scarlet') || c.includes('red')) return '#c0392b';
  if (c.includes('bordeaux')) return '#7b2335';
  if (c.includes('roxo metál')) return '#9b59b6';
  if (c.includes('roxo') || c.includes('purple') || c.includes('violet')) return '#7c4daf';
  if (c.includes('rosa fusão') || c.includes('fusion')) return '#e040a0';
  if (c.includes('rosa') || c.includes('pink') || c.includes('quartz')) return '#e8a0b0';
  if (c.includes('navy') || c.includes('night navy')) return '#1a2a4a';
  if (c.includes('azul escuro')) return '#1e3a5f';
  if (c.includes('azul') || c.includes('blue') || c.includes('bliss')) return '#2563ab';
  if (c.includes('verde') || c.includes('green')) return '#3a7d44';
  if (c.includes('amarelo') || c.includes('yellow') || c.includes('glow')) return '#e6c229';
  if (c.includes('laranja') || c.includes('orange')) return '#e07b30';
  if (c.includes('leopardo') || c.includes('cheetah')) return '#b8860b';
  if (c.includes('castanho') || c.includes('brown') || c.includes('gum')) return '#8B6346';
  if (c.includes('bege') || c.includes('beige')) return '#d4bc8e';
  if (c.includes('shadow')) return '#3d4a5c';
  if (c.includes('aura')) return '#c8a87c';
  if (c.includes('snake') || c.includes('cobra')) return '#5a7a3a';
  if (c.includes('toy story')) return '#8B6346';
  return '#888';
}

// ============================================================
// AGRUPAMENTO — produtos com o mesmo modelo base formam um grupo
// com seletor de variantes (bolinhas de cor)
// ============================================================

// Extrai o nome base de um produto (remove a cor/variante após último hífen ou após nome modelo)
// Regras de agrupamento definidas explicitamente:
const GROUP_RULES = [
  { match: /Gazelle Indoor x Bad Bunny|Gazelle x Bad Bunny/i, group: 'Adidas Gazelle Indoor' },
  { match: /CLOT x Gazelle Indoor/i, group: 'Adidas Gazelle Indoor' },
  { match: /Gazelle Indoor/i,        group: 'Adidas Gazelle Indoor' },
  { match: /Samba x Toy Story/i,     group: 'Adidas Samba OG' },
  { match: /Samba Year of the Snake/i, group: 'Adidas Samba OG' },
  { match: /Samba OG/i,              group: 'Adidas Samba OG' },
  { match: /Samba/i,                 group: 'Adidas Samba OG' },
  { match: /Handball Spezial/i,      group: 'Adidas Handball Spezial' },
  { match: /Forum 84/i,              group: 'Adidas Forum 84' },
  { match: /Superstar/i,             group: 'Adidas Superstar' },
  { match: /Air Max Plus/i,           group: 'Nike Air Max Plus' },
  { match: /Forum/i,                 group: 'Adidas Forum 84' },
];

function getGroupKey(productName) {
  for (const rule of GROUP_RULES) {
    if (rule.match.test(productName)) return rule.group;
  }
  return productName; // produto único, não agrupa
}

// Primeira tag = cor (ex: "Vermelho / Branco"), segunda = tamanhos
function getColorFromTags(tags) {
  return tags && tags[0] ? tags[0] : '–';
}

// Agrupa lista de produtos por grupo
function groupProducts(products) {
  const map = new Map();
  products.forEach(p => {
    const key = getGroupKey(p.name);
    if (!map.has(key)) map.set(key, { groupName: key, variants: [] });
    map.get(key).variants.push(p);
  });
  return Array.from(map.values());
}

const CATEGORY_ORDER = ["Sapatilhas", "T-Shirts", "Casacos", "Sweats/Hoodies", "Calças/Calções", "Fato-treino"];
const filterRow = document.getElementById('filter-row');
CATEGORY_ORDER.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.filter = cat;
  btn.textContent = cat;
  filterRow.appendChild(btn);
});

let activeFilter = 'all';
let searchQuery = '';

// Guarda qual variante está ativa por grupo (key = groupName)
const activeVariant = new Map();

function render() {
  const catalog = document.getElementById('catalog');
  catalog.innerHTML = '';
  let totalVisible = 0;

  data.forEach(brand => {
    const filteredCats = brand.categories
      .map(cat => {
        if (activeFilter !== 'all' && cat.name !== activeFilter) return null;
        const products = cat.products.filter(p => {
          if (!searchQuery) return true;
          const q = searchQuery.toLowerCase();
          return p.name.toLowerCase().includes(q)
            || p.ref.toLowerCase().includes(q)
            || p.tags.some(t => t.toLowerCase().includes(q))
            || brand.brand.toLowerCase().includes(q);
        });
        if (!products.length) return null;
        return { ...cat, products };
      })
      .filter(Boolean);

    if (!filteredCats.length) return;

    const allProducts = filteredCats.flatMap(c => c.products);
    // Conta grupos únicos para o header
    const allGroups = filteredCats.flatMap(c => groupProducts(c.products));
    totalVisible += allGroups.length;

    const section = document.createElement('div');
    section.className = 'brand-section';
    section.innerHTML = `
      <div class="brand-header">
        <div class="brand-logo-placeholder">${brand.brandInitial}</div>
        <div class="brand-info">
          <h2>${brand.brand}</h2>
          <p>${allGroups.length} modelo${allGroups.length !== 1 ? 's' : ''}</p>
        </div>
      </div>
    `;

    filteredCats.forEach(cat => {
      const group = document.createElement('div');
      group.className = 'category-group';
      group.innerHTML = `<div class="category-label">${cat.name}</div>`;
      const grid = document.createElement('div');
      grid.className = 'product-grid';

      const groups = groupProducts(cat.products);

      groups.forEach(g => {
        const variants = g.variants;
        const hasMultiple = variants.length > 1;

        // Variante activa (default = primeira)
        if (!activeVariant.has(g.groupName)) {
          activeVariant.set(g.groupName, 0);
        }
        let activeIdx = activeVariant.get(g.groupName);
        if (activeIdx >= variants.length) activeIdx = 0;
        const current = variants[activeIdx];

        const card = document.createElement('div');
        card.className = 'product-card';

        // Bolinhas de cor
        const dotsHtml = hasMultiple ? `
          <div class="color-dots">
            ${variants.map((v, i) => `
              <button
                class="color-dot ${i === activeIdx ? 'active' : ''}"
                style="background: ${getSwatchColor(getColorFromTags(v.tags))}"
                title="${getColorFromTags(v.tags)}"
                data-group="${g.groupName}"
                data-idx="${i}"
              ></button>
            `).join('')}
          </div>
        ` : '';

        // Contagem de variantes
        const variantCount = hasMultiple
          ? `<span class="variant-count">${variants.length} cores</span>`
          : '';

        const prevArrow = hasMultiple ? `<button class="nav-arrow prev" data-group="${g.groupName}" data-dir="-1" title="Anterior">&#8249;</button>` : '';
        const nextArrow = hasMultiple ? `<button class="nav-arrow next" data-group="${g.groupName}" data-dir="1" title="Seguinte">&#8250;</button>` : '';

        card.innerHTML = `
          <span class="order-badge">Encomendar</span>
          <div class="img-wrap" data-group="${g.groupName}" data-total="${variants.length}">
            ${prevArrow}
            ${current.img
              ? `<img class="product-img variant-img" src="${current.img}" alt="${current.name}" loading="lazy">`
              : `<div class="product-img-placeholder">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
                  <span>Adicionar foto</span>
                 </div>`}
            ${nextArrow}
          </div>
          ${dotsHtml}
          <div class="product-info">
            <div class="product-name">${g.groupName}${variantCount}</div>
            <div class="variant-color-name">${getColorFromTags(current.tags)}</div>
            <div class="product-ref">${current.ref}</div>
            <div class="product-tags">${current.tags.map(t => `<span class="product-tag">${t}</span>`).join('')}</div>
            <div class="product-price">${current.price}</div>
          </div>
        `;

        // Clique na bolinha → troca variante (não abre modal)
        card.querySelectorAll('.color-dot').forEach(dot => {
          dot.addEventListener('click', e => {
            e.stopPropagation();
            const grp = dot.dataset.group;
            const idx = parseInt(dot.dataset.idx);
            activeVariant.set(grp, idx);
            render();
          });
        });

        // Setas de navegação → avança/recua variante
        card.querySelectorAll('.nav-arrow').forEach(arrow => {
          arrow.addEventListener('click', e => {
            e.stopPropagation();
            const grp = arrow.dataset.group;
            const dir = parseInt(arrow.dataset.dir);
            const total = variants.length;
            const cur = activeVariant.get(grp) || 0;
            activeVariant.set(grp, (cur + dir + total) % total);
            render();
          });
        });

        // Swipe touch (mobile) → troca variante
        if (hasMultiple) {
          const imgW = card.querySelector('.img-wrap');
          if (imgW) {
            let touchStartX = 0;
            imgW.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
            imgW.addEventListener('touchend', e => {
              const dx = e.changedTouches[0].clientX - touchStartX;
              if (Math.abs(dx) > 40) {
                const dir = dx < 0 ? 1 : -1;
                const total = variants.length;
                const cur = activeVariant.get(g.groupName) || 0;
                activeVariant.set(g.groupName, (cur + dir + total) % total);
                render();
              }
            }, { passive: true });
          }
        }

        // Clique no card → abre modal com variante actual
        card.addEventListener('click', () => openModal(current, brand.brand));

        grid.appendChild(card);
      });

      group.appendChild(grid);
      section.appendChild(group);
    });

    catalog.appendChild(section);
  });

  if (totalVisible === 0) {
    catalog.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <p>Nenhum produto encontrado para "<strong>${searchQuery}</strong>"</p>
      </div>`;
  }

  document.getElementById('results-info').textContent =
    totalVisible > 0 ? `${totalVisible} modelo${totalVisible !== 1 ? 's' : ''} encontrado${totalVisible !== 1 ? 's' : ''}` : '';
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

function openModal(p, brandName) {
  document.getElementById('modal-brand').textContent = brandName;
  document.getElementById('modal-name').textContent = p.name;
  document.getElementById('modal-ref').textContent = p.ref;
  document.getElementById('modal-price').textContent = p.price;
  document.getElementById('modal-tags').innerHTML = p.tags.map(t => `<span class="modal-tag">${t}</span>`).join('');
  const allImgs = p.img ? [p.img, ...(p.imgs || [])] : [];
  let modalImgIdx = 0;

  function renderModalImg() {
    const wrap = document.getElementById('modal-img-wrap');
    if (!allImgs.length) {
      wrap.innerHTML = `<div class="modal-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>`;
      return;
    }
    const hasMulti = allImgs.length > 1;
    wrap.innerHTML = `
      <div class="modal-gallery" id="modal-gallery">
        ${hasMulti ? `<button class="modal-nav prev" id="mgal-prev">&#8249;</button>` : ''}
        <img class="modal-img" src="${allImgs[modalImgIdx]}" alt="${p.name}" id="mgal-img">
        ${hasMulti ? `<button class="modal-nav next" id="mgal-next">&#8250;</button>` : ''}
        ${hasMulti ? `<div class="modal-dots">${allImgs.map((_,i)=>`<span class="modal-dot ${i===modalImgIdx?'active':''}" data-i="${i}"></span>`).join('')}</div>` : ''}
      </div>`;

    if (hasMulti) {
      wrap.querySelector('#mgal-prev').onclick = () => { modalImgIdx = (modalImgIdx - 1 + allImgs.length) % allImgs.length; renderModalImg(); };
      wrap.querySelector('#mgal-next').onclick = () => { modalImgIdx = (modalImgIdx + 1) % allImgs.length; renderModalImg(); };
      wrap.querySelectorAll('.modal-dot').forEach(dot => {
        dot.onclick = () => { modalImgIdx = parseInt(dot.dataset.i); renderModalImg(); };
      });
      // Touch swipe
      let tx = 0;
      const gal = wrap.querySelector('#modal-gallery');
      gal.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
      gal.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - tx;
        if (Math.abs(dx) > 40) { modalImgIdx = (modalImgIdx + (dx < 0 ? 1 : -1) + allImgs.length) % allImgs.length; renderModalImg(); }
      }, { passive: true });
    }
  }
  renderModalImg();
  document.getElementById('btn-order').onclick = () => {
    window.open(`${INSTAGRAM}?text=Olá! Tenho interesse em: ${p.name} (${p.ref})`, '_blank');
  };
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
